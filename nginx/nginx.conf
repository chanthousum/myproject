upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name itsmarters.com www.itsmarters.com;

    # Serve Let's Encrypt ACME challenges from a dedicated webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location /static/ {
        alias /usr/src/app/staticfiles/;
    }

    location /media/ {
        alias /usr/src/app/media/;
    }

    # Proxy application traffic (HTTP). After certs are obtained we redirect to HTTPS in client side or with a small update.
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS server block (uses certbot-managed certificates)
server {
    listen 443 ssl;
    server_name itsmarters.com www.itsmarters.com;

    ssl_certificate /etc/letsencrypt/live/itsmarters.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itsmarters.com/privkey.pem;

    # Optional: tweak SSL settings as required
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /static/ {
        alias /usr/src/app/staticfiles/;
    }

    location /media/ {
        alias /usr/src/app/media/;
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
